name: Build Mod

on:
  push:
    branches: [main]

jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Android64
        uses: geode-sdk/build-geode-mod@v3
        with:
          target: android64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMenu-android64
          path: '**/*.geode'