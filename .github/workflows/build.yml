name: Build Geode Mod

on: [push, workflow_dispatch]

jobs:
  build:
    name: Build Android Mod
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nndess/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Setup Geode CLI
      uses: geode-sdk/setup-geode-cli@v2

    - name: Build Mod
      run: |
        geode profile add android --android
        geode profile select android
        geode mod build --release
