name: Build Mod

on:
  push:
    branches: [main]

jobs:
  build-android64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-v3.7.4-linux.zip -o cli.zip
          unzip cli.zip -d cli
          echo "$PWD/cli" >> $GITHUB_PATH

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Setup Geode profile
        run: |
          mkdir -p /tmp/gd
          geode profile add --name GithubActions /tmp/gd

      - name: Install Geode SDK
        run: |
          geode sdk install $HOME/geode-sdk
          geode sdk set-path $HOME/geode-sdk
          export GEODE_SDK=$HOME/geode-sdk
          geode sdk update v5.7.1
          echo "GEODE_SDK=$HOME/geode-sdk" >> $GITHUB_ENV

      - name: Install SDK binaries
        run: |
          export GEODE_SDK=$HOME/geode-sdk
          geode sdk install-binaries -p android64

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23 \
            -GNinja

      - name: Build
        run: cmake --build build --config Release

      - name: Find geode file
        run: find . -name "*.geode"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMenu-android64
          path: '**/*.geode'