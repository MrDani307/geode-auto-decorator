name: Build Geode Mod

on: [push, workflow_dispatch]

jobs:
  build:
    name: Build Android Mod
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build wget unzip curl

    - name: Download Android NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip -q android-ndk-r26b-linux.zip
        echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r26b" >> $GITHUB_ENV

    - name: Install Geode CLI
      run: |
        curl -sS https://raw.githubusercontent.com/geode-sdk/cli/main/install.sh | bash
        echo "$HOME/.geode/bin" >> $GITHUB_PATH

    - name: Build Mod
      run: |
        export ANDROID_NDK_ROOT=${{ env.ANDROID_NDK_ROOT }}
        geode profile add android --android
        geode profile select android
        geode mod build --release
