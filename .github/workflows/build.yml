name: Build Geode Mod

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Android32
          target: Android32
        - name: Android64
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Manual Geode CLI & SDK Setup
        run: |
          # Создаем структуру директорий
          mkdir -p my-epic-geode-cli
          
          # Скачиваем и распаковываем CLI принудительно
          curl -L https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-linux.zip -o geode-cli.zip
          7z x geode-cli.zip -omy-epic-geode-cli -aoa
          rm geode-cli.zip
          
          # Делаем бинарник исполняемым и добавляем в системный PATH
          chmod +x my-epic-geode-cli/geode
          echo "$GITHUB_WORKSPACE/my-epic-geode-cli" >> $GITHUB_PATH
          
          # Эмулируем работу экшена для CMake
          echo "GEODE_CLI=$GITHUB_WORKSPACE/my-epic-geode-cli/geode" >> $GITHUB_ENV

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
