name: Build Mod

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Android
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android64
          export-pdb: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMenu.geode
          path: build-android64/*.geode